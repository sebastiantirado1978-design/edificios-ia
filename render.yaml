services:
  - type: web
    name: edificios-ia
    runtime: node
    buildCommand: "npm install && sed -i 's/provider = \"sqlite\"/provider = \"postgresql\"/' prisma/schema.prisma && npx prisma generate && npx prisma db push --accept-data-loss && npm run build"
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: edificiosIA2025
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: INTERNAL_API_URL
        sync: false

databases:
  - name: edificios-ia-db
    databaseName: edificios_ia
    user: edificios_ia
